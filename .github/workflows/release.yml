name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build release binaries
        run: make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/davoid-linux-amd64
            dist/davoid-linux-arm64
            dist/davoid-darwin-amd64
            dist/davoid-darwin-arm64
            dist/checksums.txt
          generate_release_notes: true
          body: |
            ## Davoid ${{ github.ref_name }}

            **Operator-grade red team engagement platform. 20 modules. One Docker command.**

            ---

            ### Install

            Only requirement: [Docker](https://docs.docker.com/get-docker/)

            ```bash
            git clone https://github.com/BryanParreira/Davoid.git
            cd Davoid
            ```

            **Safe mode** — OSINT, web recon, AI console, phishing, auditor:
            ```bash
            docker compose --profile safe up
            ```

            **Full mode** — all modules including sniff, mitm, scanner (raw network access):
            ```bash
            docker compose --profile full up
            ```

            Davoid opens in your terminal. Engagement data and reports persist via Docker volumes across restarts.

            ---

            ### First run
            ```bash
            # TUI launches automatically — navigate with arrow keys
            # Or run modules directly from a second terminal:
            docker compose --profile safe run davoid-safe davoid new "Corp Pentest" --target 10.0.0.0/24
            docker compose --profile safe run davoid-safe davoid run auditor
            docker compose --profile safe run davoid-safe davoid modules
            docker compose --profile safe run davoid-safe davoid report
            ```

            > **For authorized penetration testing and security research only.**

            See [README](https://github.com/BryanParreira/Davoid#readme) for full documentation.
