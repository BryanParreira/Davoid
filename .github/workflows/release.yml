name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build release binaries
        run: make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/davoid-linux-amd64
            dist/davoid-linux-arm64
            dist/davoid-darwin-amd64
            dist/davoid-darwin-arm64
            dist/checksums.txt
          generate_release_notes: true
          body: |
            ## Davoid ${{ github.ref_name }}

            **Single-binary, pure-Go red team engagement platform. No Python, no Docker, no dependencies.**

            ---

            ### Install Options

            #### Option 1 — Docker (recommended for evaluation)
            ```bash
            # Safe mode — OSINT, web, AI, phishing (no raw network access)
            docker run -it --rm \
              -v davoid-data:/root/.davoid \
              -v $(pwd)/reports:/app/reports \
              ghcr.io/bryanparreira/davoid:${{ github.ref_name }}

            # Full mode — all modules including sniff & mitm (host network)
            docker run -it --rm --net=host \
              --cap-add NET_RAW --cap-add NET_ADMIN \
              -v davoid-data:/root/.davoid \
              ghcr.io/bryanparreira/davoid:${{ github.ref_name }}
            ```

            #### Option 2 — Pre-built binary

            Verify checksum before running (`checksums.txt` is in this release):

            ##### macOS (Apple Silicon)
            ```bash
            curl -Lo davoid https://github.com/BryanParreira/Davoid/releases/download/${{ github.ref_name }}/davoid-darwin-arm64
            curl -Lo checksums.txt https://github.com/BryanParreira/Davoid/releases/download/${{ github.ref_name }}/checksums.txt
            grep davoid-darwin-arm64 checksums.txt | sha256sum -c -
            chmod +x davoid && sudo mv davoid /usr/local/bin/
            davoid
            ```

            ##### macOS (Intel)
            ```bash
            curl -Lo davoid https://github.com/BryanParreira/Davoid/releases/download/${{ github.ref_name }}/davoid-darwin-amd64
            curl -Lo checksums.txt https://github.com/BryanParreira/Davoid/releases/download/${{ github.ref_name }}/checksums.txt
            grep davoid-darwin-amd64 checksums.txt | sha256sum -c -
            chmod +x davoid && sudo mv davoid /usr/local/bin/
            davoid
            ```

            ##### Linux x86_64
            ```bash
            curl -Lo davoid https://github.com/BryanParreira/Davoid/releases/download/${{ github.ref_name }}/davoid-linux-amd64
            curl -Lo checksums.txt https://github.com/BryanParreira/Davoid/releases/download/${{ github.ref_name }}/checksums.txt
            grep davoid-linux-amd64 checksums.txt | sha256sum -c -
            chmod +x davoid && sudo mv davoid /usr/local/bin/
            davoid
            ```

            ##### Linux ARM64 (Raspberry Pi, cloud VMs)
            ```bash
            curl -Lo davoid https://github.com/BryanParreira/Davoid/releases/download/${{ github.ref_name }}/davoid-linux-arm64
            curl -Lo checksums.txt https://github.com/BryanParreira/Davoid/releases/download/${{ github.ref_name }}/checksums.txt
            grep davoid-linux-arm64 checksums.txt | sha256sum -c -
            chmod +x davoid && sudo mv davoid /usr/local/bin/
            davoid
            ```

            #### Option 3 — Build from source
            ```bash
            git clone https://github.com/BryanParreira/Davoid.git
            cd Davoid
            make install
            davoid
            ```

            ---

            ### First run
            ```bash
            davoid                                    # open TUI
            davoid new "Corp Pentest" --target 10.0.0.0/24
            davoid run auditor                        # pre-flight check
            davoid modules                            # list all modules
            ```

            > **For authorized penetration testing and security research only.**

            See [README](https://github.com/BryanParreira/Davoid#readme) for full documentation.
