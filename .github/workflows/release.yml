name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build release binaries
        run: make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/davoid-linux-amd64
            dist/davoid-linux-arm64
            dist/davoid-darwin-amd64
            dist/davoid-darwin-arm64
            dist/checksums.txt
            install.sh
          generate_release_notes: true
          body: |
            ## Davoid ${{ github.ref_name }}

            **Operator-grade red team engagement platform. 20 modules. One command.**

            ---

            ### Install

            ```bash
            curl -sSL https://github.com/BryanParreira/Davoid/releases/latest/download/install.sh | bash
            ```

            Works on macOS (Apple Silicon + Intel) and Linux (x86_64 + ARM64).
            Downloads the correct binary for your platform, verifies the checksum, installs to PATH.

            Then just run:

            ```bash
            davoid
            ```

            ---

            ### First run
            ```bash
            davoid                                         # open TUI
            davoid new "Corp Pentest" --target 10.0.0.0/24
            davoid run auditor                             # pre-flight check
            davoid modules                                 # list all 20 modules
            davoid report                                  # generate report
            ```

            > **For authorized penetration testing and security research only.**

            See [README](https://github.com/BryanParreira/Davoid#readme) for full documentation.
